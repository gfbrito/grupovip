version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: wpp-grupos-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: wpp_grupos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
